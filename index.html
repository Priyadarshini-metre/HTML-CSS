<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie App</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <header>
        <h1 class="logo">🍔 Foodie</h1>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#">Offers</a></li>
                <li><a href="#">Contact</a></li>
                <li>🛒 Cart: <span id="cart-count">0</span></li>
            </ul>
        </nav>

    </header>

    <section class="hero">
        <h2>Delicious Food Delivered Fast</h2>
        <p>Order your favourite meals anytime</p>
        <button id="orderBtn">Order Now</button>
    </section>

    <section class="menu" id="menu">

        <h2 class="title">Popular Dishes</h2>

        <div class="food-container">

            <div class="card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
                <h3>Burger</h3>
                <p>Cheesy double burger</p>
                <span>₹199</span>
                <button class="cart-btn">Add to Cart</button>
            </div>

            <div class="card">
                <img
                    src="https://images.unsplash.com/photo-1593560708920-61dd98c46a4e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fHBpenphfGVufDB8fDB8fHww">
                <h3>Pizza</h3>
                <p>Italian cheese pizza</p>
                <span>₹299</span>
                <button class="cart-btn">Add to Cart</button>
            </div>

            <div class="card">
                <img
                    src="https://plus.unsplash.com/premium_photo-1664478288635-b9703a502393?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8cGFzdGF8ZW58MHx8MHx8fDA%3D">
                <h3>Pasta</h3>
                <p>Creamy white sauce pasta</p>
                <span>₹249</span>
                <button class="cart-btn">Add to Cart</button>
            </div>

        </div>

    </section>

    <footer>
        <p>© 2026 Foodie App</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
